<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My College Portfolio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #1a73e8; margin-bottom: 10px; }
        p { color: #5f6368; margin-bottom: 20px; font-size: 14px; }
        .form-group { text-align: left; margin-bottom: 15px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-top: 5px; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #1557b0; }
        #status { margin-top: 15px; font-size: 12px; font-weight: bold; padding: 8px; border-radius: 5px; background: #e8f0fe; color: #1967d2; }
    </style>
</head>
<body>

<div class="card">
    <h1>My Portfolio</h1>
    <p>Fullstack College Project using Node.js & TiDB Cloud</p>
    
    <div id="status">Checking Database...</div>

    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

    <div class="form-group">
        <input type="text" id="userName" placeholder="Your Name">
    </div>
    <div class="form-group">
        <textarea id="userMsg" placeholder="Your Message" rows="3"></textarea>
    </div>
    <button onclick="sendData()">Send Message</button>
</div>

<script>
    // Check connection on load
    fetch('/status')
        .then(res => res.text())
        .then(data => document.getElementById('status').innerText = data)
        .catch(() => document.getElementById('status').innerText = "Offline ❌");

    // Send data to TiDB
    function sendData() {
        const name = document.getElementById('userName').value;
        const message = document.getElementById('userMsg').value;

        if(!name || !message) return alert("Fill both fields!");

        fetch('/contact', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, message })
        })
        .then(res => res.text()) 
        .then(data => {
            alert(data);
            document.getElementById('userName').value = "";
            document.getElementById('userMsg').value = "";
        });
    }
</script>

</body>
</html>
