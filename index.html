<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio | College Project</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f4f7f6; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 { color: #2c3e50; margin-bottom: 10px; font-size: 24px; }
        p { color: #7f8c8d; line-height: 1.6; margin-bottom: 20px; }
        .status-box {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
        }
        .footer { margin-top: 20px; font-size: 12px; color: #bdc3c7; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hi, I'm [Your Name]</h1>
        <p>This is my Fullstack Portfolio project for college, powered by Node.js and TiDB Cloud.</p>
        
        <div id="status" class="status-box">Connecting to Database...</div>
        
        <div class="footer">Built with HTML • CSS • JS • MySQL</div>
    </div>

    <script>
        // Check the server status
        fetch('/status')
            .then(response => response.text())
            .then(data => {
                document.getElementById('status').innerText = data;
            })
            .catch(err => {
                document.getElementById('status').innerText = "Connection Failed";
                document.getElementById('status').style.background = "#ffebee";
                document.getElementById('status').style.color = "#c62828";
            });
    </script>
</body>
</html>
